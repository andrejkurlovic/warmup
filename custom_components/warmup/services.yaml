set_override:
  name: Set temperature override
  description: Override the target temperature for a thermostat until a given time.
  target:
    entity:
      domain: climate
      integration: warmup
  fields:
    temperature:
      name: Temperature
      description: Override temperature in °C (0.5° steps).
      required: true
      selector:
        number:
          min: 5
          max: 35
          step: 0.5
          unit_of_measurement: "°C"
    until:
      name: Until
      description: "Time the override ends (HH:MM). Defaults to 1 hour from now."
      required: false
      example: "14:00"
      selector:
        text:

cancel_override:
  name: Cancel temperature override
  description: Cancel an active temperature override and return to the normal programme.
  target:
    entity:
      domain: climate
      integration: warmup

set_programme:
  name: Set programme schedule (experimental — not live-tested)
  description: >
    EXPERIMENTAL. Sets the weekly heating programme schedule for a room via the
    Warmup V1 REST API. The schedule body format is fully specified but has not
    been live-tested against a real account. Use with caution. This service
    currently raises an error to prevent accidental use until live testing is
    confirmed.
  target:
    entity:
      domain: climate
      integration: warmup

fetch_schedule_diagnostics:
  name: Probe schedule data (diagnostic)
  description: >
    DIAGNOSTIC / READ-ONLY. Probes the Warmup GraphQL API for schedule data for
    the selected thermostat room without affecting normal polling or heating.
    The result (or a clear error) is written to the Home Assistant log at WARNING
    level. Use Developer Tools → Actions to call this service, then check the
    HA log for a line beginning "WarmUp schedule probe:".
    Purpose: confirm whether the schedule field is supported on your account
    before implementing schedule editing.
  target:
    entity:
      domain: climate
      integration: warmup

copy_current_schedule_template:
  name: Copy current schedule template
  description: >
    Logs the current room schedule as JSON to the HA log (WARNING level).
    Copy the output and pass it to warmup.set_schedule.
    No heating changes.
  target:
    entity:
      domain: climate
      integration: warmup

set_schedule:
  name: Set heating schedule
  description: >
    Writes a weekly heating schedule for the target room via the Warmup
    V1 setProgramme API. Always run with dry_run=true first to validate
    and log the payload. Set dry_run=false only after confirming the
    dry-run payload is correct.
    Schedule must be a list of 7 entries (one per day, day 0=Sun 6=Sat).
    Each entry: {day, mode, type, node, value: [{start, end, temp}]}.
    Temperatures as tenths-of-degrees strings (e.g. "220" = 22.0°C).
  target:
    entity:
      domain: climate
      integration: warmup
  fields:
    schedule:
      name: Schedule
      description: "List of 7 day entries. Get the format from copy_current_schedule_template."
      required: true
      selector:
        object:
    dry_run:
      name: Dry run
      description: "If true (default), validates and logs only — does not call the API."
      required: false
      default: true
      selector:
        boolean:
