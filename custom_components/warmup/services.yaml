set_override:
  name: Set temperature override
  description: Override the target temperature for a thermostat until a given time.
  target:
    entity:
      domain: climate
      integration: warmup
  fields:
    temperature:
      name: Temperature
      description: Override temperature in °C (0.5° steps).
      required: true
      selector:
        number:
          min: 5
          max: 35
          step: 0.5
          unit_of_measurement: "°C"
    until:
      name: Until
      description: "Time the override ends (HH:MM). Defaults to 1 hour from now."
      required: false
      example: "14:00"
      selector:
        text:

cancel_override:
  name: Cancel temperature override
  description: Cancel an active temperature override and return to the normal programme.
  target:
    entity:
      domain: climate
      integration: warmup

set_programme:
  name: Set programme schedule (experimental — not live-tested)
  description: >
    EXPERIMENTAL. Sets the weekly heating programme schedule for a room via the
    Warmup V1 REST API. The schedule body format is fully specified but has not
    been live-tested against a real account. Use with caution. This service
    currently raises an error to prevent accidental use until live testing is
    confirmed.
  target:
    entity:
      domain: climate
      integration: warmup

fetch_schedule_diagnostics:
  name: Probe schedule data (diagnostic)
  description: >
    DIAGNOSTIC / READ-ONLY. Probes the Warmup GraphQL API for schedule data for
    the selected thermostat room without affecting normal polling or heating.
    The result (or a clear error) is written to the Home Assistant log at WARNING
    level. Use Developer Tools → Actions to call this service, then check the
    HA log for a line beginning "WarmUp schedule probe:".
    Purpose: confirm whether the schedule field is supported on your account
    before implementing schedule editing.
  target:
    entity:
      domain: climate
      integration: warmup
